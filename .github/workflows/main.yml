name: k6 Token Test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  k6-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 test
        run: k6 run token-test.js
        continue-on-error: true

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: |
            summary.json
            *.json
          if-no-files-found: ignore
